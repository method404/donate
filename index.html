<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Donate</title>
    <meta
      name="description"
      content="Toonarr donation page with BTC, ETH, and USDT wallet addresses."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #11151b;
        --panel: #171c23;
        --panel-strong: #1a2027;
        --line: #2b333d;
        --line-strong: #36414c;
        --text: #f4f7fb;
        --muted: #a8b4c0;
        --muted-strong: #d7e0e8;
        --accent: #19c37d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        font: inherit;
      }

      main {
        width: min(1080px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 40px 0 72px;
      }

      header {
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 5vw, 3.8rem);
        line-height: 1;
        letter-spacing: -0.04em;
      }

      .browser {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-top: 22px;
      }

      .token-list {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .token-button {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 14px 16px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        text-align: left;
        cursor: pointer;
      }

      .token-button.active {
        border-color: var(--accent);
        background: #1b2329;
      }

      .token-icon {
        display: block;
        width: 52px;
        height: 52px;
        flex: 0 0 auto;
        object-fit: contain;
      }

      .token-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .token-meta strong {
        font-size: 1rem;
        line-height: 1.1;
      }

      .token-meta span {
        color: #98a6b4;
        font-size: 0.82rem;
      }

      .card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 248px;
        gap: 24px;
        align-items: center;
        padding: 18px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .address-label {
        margin: 0 0 8px;
        color: #ffffff;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .address-row {
        display: flex;
        align-items: flex-start;
      }

      .address-inline {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
      }

      .address {
        margin: 0;
        color: var(--text);
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.55;
        word-break: break-word;
      }

      .copy-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        border: 1px solid var(--line-strong);
        background: #222931;
        color: #ffffff;
        cursor: pointer;
      }

      .copy-button.copied {
        border-color: var(--accent);
        color: var(--accent);
      }

      .qr-panel {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qr-image,
      .qr-placeholder {
        width: 220px;
        height: 220px;
        border: 1px solid #2c343d;
        background: #ffffff;
      }

      .qr-image {
        display: block;
        object-fit: contain;
      }

      .qr-placeholder {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: #87929e;
        font-size: 1.2rem;
        font-weight: 700;
      }

      .note-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px;
        border: 1px solid var(--line);
        background: var(--panel);
      }

      .note-copy h2 {
        margin: 0 0 6px;
        font-size: 1.1rem;
        line-height: 1.1;
      }

      .note-copy p {
        margin: 0;
        color: #ffffff;
        font-size: 0.92rem;
        line-height: 1.55;
      }

      .github-link {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border: 1px solid #2d3842;
        background: var(--panel-strong);
        color: var(--text);
      }

      .github-copy {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .github-copy strong {
        font-size: 0.88rem;
        line-height: 1;
      }

      .github-copy span {
        color: #9ba9b7;
        font-size: 0.82rem;
        line-height: 1.2;
      }

      @media (max-width: 860px) {
        .token-list {
          grid-template-columns: 1fr;
        }

        .card,
        .note-card {
          grid-template-columns: 1fr;
          flex-direction: column;
          align-items: flex-start;
        }

        .qr-panel {
          justify-content: flex-start;
        }

        .address-row {
          flex-direction: column;
          align-items: flex-start;
        }

        .address-inline {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Donate</h1>
      </header>

      <section class="browser">
        <div class="token-list" id="token-list"></div>

        <article class="card">
          <div>
            <p class="address-label">지갑 주소</p>
            <div class="address-row">
              <div class="address-inline">
                <p class="address" id="wallet-address"></p>
                <button
                  type="button"
                  class="copy-button"
                  id="copy-button"
                  aria-label="주소 복사"
                  title="주소 복사"
                >
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                    aria-hidden="true"
                  >
                    <path
                      d="M9 9.75A2.25 2.25 0 0 1 11.25 7.5h7.5A2.25 2.25 0 0 1 21 9.75v9A2.25 2.25 0 0 1 18.75 21h-7.5A2.25 2.25 0 0 1 9 18.75v-9Z"
                      stroke="currentColor"
                      stroke-width="1.7"
                    />
                    <path
                      d="M15 7.5V5.25A2.25 2.25 0 0 0 12.75 3h-7.5A2.25 2.25 0 0 0 3 5.25v9a2.25 2.25 0 0 0 2.25 2.25H9"
                      stroke="currentColor"
                      stroke-width="1.7"
                    />
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="qr-panel">
            <img class="qr-image" id="qr-image" alt="Donation QR" />
          </div>
        </article>

        <section class="note-card">
          <div class="note-copy">
            <h2>감사합니다!</h2>
            <p>후원은 유지보수와 기능 개선에 직접적인 도움이 됩니다.</p>
          </div>
          <a
            href="https://github.com/method404"
            target="_blank"
            rel="noreferrer"
            class="github-link"
          >
            <span aria-hidden="true">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="currentColor"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path d="M12 .5C5.649.5.5 5.649.5 12c0 5.084 3.292 9.398 7.86 10.921.575.106.785-.25.785-.555 0-.274-.01-1-.015-1.962-3.197.695-3.872-1.54-3.872-1.54-.523-1.328-1.278-1.681-1.278-1.681-1.045-.714.079-.699.079-.699 1.155.081 1.763 1.187 1.763 1.187 1.026 1.757 2.692 1.25 3.349.956.104-.743.402-1.25.731-1.538-2.552-.29-5.236-1.276-5.236-5.682 0-1.255.448-2.282 1.182-3.087-.119-.29-.512-1.458.112-3.04 0 0 .965-.309 3.163 1.179a10.96 10.96 0 0 1 2.88-.387c.977.004 1.963.132 2.882.387 2.196-1.488 3.159-1.18 3.159-1.18.627 1.583.234 2.751.115 3.041.736.805 1.18 1.832 1.18 3.087 0 4.417-2.688 5.389-5.25 5.673.413.355.781 1.054.781 2.125 0 1.534-.014 2.772-.014 3.148 0 .308.207.667.79.554C20.212 21.394 23.5 17.082 23.5 12 23.5 5.649 18.351.5 12 .5Z" />
              </svg>
            </span>
            <span class="github-copy">
              <strong>GitHub</strong>
              <span>github.com/method404</span>
            </span>
          </a>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script>
      const methods = [
        {
          id: "btc",
          symbol: "BTC",
          network: "Bitcoin",
          address: "bc1qxl7gyypw6xcrtd8zxjlxdmmgj902tfmfqx00kf",
          iconUrl: "./assets/btc.png",
        },
        {
          id: "eth",
          symbol: "ETH",
          network: "Ethereum",
          address: "0x484De1E836468bF00dB4a4faFC9E877038e69B1F",
          iconUrl: "./assets/eth.png",
        },
        {
          id: "usdt_trx",
          symbol: "USDT",
          network: "TRON (TRC20)",
          address: "TRa4GyBTJEk3UNHSCL5L5nXBNjHLKN15bJ",
          iconUrl: "./assets/usdt.png",
        },
      ];

      const state = { selectedId: methods[0].id };
      const tokenList = document.getElementById("token-list");
      const walletAddress = document.getElementById("wallet-address");
      const qrImage = document.getElementById("qr-image");
      const copyButton = document.getElementById("copy-button");

      function getSelectedMethod() {
        return methods.find((method) => method.id === state.selectedId) || methods[0];
      }

      async function renderSelected() {
        const method = getSelectedMethod();
        walletAddress.textContent = method.address;
        qrImage.alt = `${method.symbol} donation QR`;
        qrImage.src = await QRCode.toDataURL(method.address, {
          margin: 1,
          width: 220,
          color: { dark: "#12171d", light: "#ffffffff" },
        });
      }

      function renderButtons() {
        tokenList.innerHTML = "";

        methods.forEach((method) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "token-button" + (method.id === state.selectedId ? " active" : "");
          button.addEventListener("click", () => {
            state.selectedId = method.id;
            renderButtons();
            renderSelected();
          });

          button.innerHTML = `
            <img src="${method.iconUrl}" alt="${method.symbol}" width="52" height="52" class="token-icon" />
            <span class="token-meta">
              <strong>${method.symbol}</strong>
              <span>${method.network}</span>
            </span>
          `;

          tokenList.appendChild(button);
        });
      }

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(getSelectedMethod().address);
        copyButton.classList.add("copied");
        copyButton.setAttribute("title", "복사됨");
        copyButton.setAttribute("aria-label", "복사됨");
        window.setTimeout(() => {
          copyButton.classList.remove("copied");
          copyButton.setAttribute("title", "주소 복사");
          copyButton.setAttribute("aria-label", "주소 복사");
        }, 1600);
      });

      renderButtons();
      renderSelected();
    </script>
  </body>
</html>
