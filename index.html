<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Donate</title>
    <meta
      name="description"
      content="Generic EVM donation page preview with network selection, token selection, and direct USD input."
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1016;
        --panel: #111821;
        --panel-strong: #161f29;
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(255, 255, 255, 0.14);
        --text: #f7f9fc;
        --muted: #94a0ac;
        --accent: #19c37d;
        --accent-soft: rgba(25, 195, 125, 0.08);
        --danger: #d14a52;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      main {
        width: min(1440px, calc(100vw - 72px));
        margin: 0 auto;
        padding: 32px 0 56px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 6vw, 4.4rem);
        line-height: 0.94;
        letter-spacing: -0.04em;
        font-weight: 500;
      }

      .wallet-chip {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 0;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 500;
      }

      .wallet-chip-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--danger);
      }

      .wallet-chip.connected .wallet-chip-dot {
        background: var(--accent);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(620px, 1.02fr) minmax(560px, 0.98fr);
        gap: 52px;
        margin-top: 28px;
        align-items: start;
      }

      .card.right-pane {
        border-left: 1px solid var(--line);
        padding-left: 44px;
      }

      .card.right-pane .card-section {
        display: flex;
        flex-direction: column;
      }

      .card {
        border: 0;
        background: transparent;
        border-radius: 0;
        overflow: visible;
      }

      .card-section {
        padding: 20px 0;
        border-top: 1px solid var(--line);
      }

      .card-section:first-child {
        border-top: 0;
      }

      .stacked-section {
        border-top: 0;
        padding-top: 26px;
      }

      .section-label {
        margin: 0 0 14px;
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .network-grid,
      .asset-grid {
        display: grid;
        gap: 14px;
      }

      .network-grid {
        grid-template-columns: repeat(4, minmax(132px, 1fr));
        justify-content: start;
      }

      .asset-grid {
        grid-template-columns: repeat(2, minmax(176px, 238px));
        justify-content: start;
        gap: 18px;
      }

      .network-button,
      .asset-button {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        width: 100%;
        min-height: 78px;
        padding: 12px 0;
        border: 1px solid transparent;
        border-bottom: 1px solid var(--line-strong);
        background: transparent;
        color: var(--text);
        text-align: left;
        transition: border-color 140ms ease, background 140ms ease;
        border-radius: 0;
      }

      .network-button:hover,
      .asset-button:hover {
        border-bottom-color: rgba(255, 255, 255, 0.22);
      }

      .network-button.active,
      .asset-button.active {
        border-bottom-color: var(--accent);
        background: transparent;
        color: #ffffff;
        box-shadow: inset 0 -2px 0 0 var(--accent);
      }

      .option-icon-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
      }

      .option-icon {
        display: block;
        width: 34px;
        height: 34px;
        object-fit: contain;
      }

      .button-copy {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
        min-width: 0;
      }

      .button-copy strong {
        font-size: 0.98rem;
        line-height: 1;
        font-weight: 600;
        white-space: nowrap;
      }

      .button-copy span {
        color: var(--muted);
        font-size: 0.8rem;
        white-space: nowrap;
      }

      .field-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 18px;
        margin-top: 0;
        align-items: end;
        border-bottom: 1px solid var(--line-strong);
      }

      .field-grid:focus-within {
        border-bottom-color: var(--accent);
      }

      .text-field {
        width: 100%;
        padding: 10px 0 16px;
        border: 0;
        background: transparent;
        color: var(--text);
        outline: none;
        border-radius: 0;
        font-size: 4rem;
        line-height: 1;
      }

      .unit-label {
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        min-height: 74px;
        padding-bottom: 16px;
        color: #d4dbe3;
        font-size: 1.2rem;
        line-height: 1;
        white-space: nowrap;
      }

      .action-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 72px;
        padding: 0 16px;
        border: 1px solid var(--line-strong);
        background: transparent;
        color: var(--text);
        border-radius: 0;
        font-size: 0.98rem;
        font-weight: 600;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
      }

      .button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .status-text {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-text:empty {
        display: none;
      }

      .or-separator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-top: 42px;
        margin-bottom: 34px;
        color: var(--muted);
        font-size: 0.95rem;
        letter-spacing: 0.08em;
      }

      .or-separator::before,
      .or-separator::after {
        content: "";
        display: block;
        width: 120px;
        height: 1px;
        background: var(--line);
      }

      .address {
        margin: 0;
        font-size: 0.92rem;
        font-weight: 700;
        line-height: 1.4;
        white-space: nowrap;
        overflow: visible;
        text-overflow: clip;
        flex: 0 0 auto;
      }

      .direct-transfer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
      }

      .address-block {
        flex: 1 1 auto;
        min-width: 0;
      }

      .address-field {
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        min-height: 44px;
        margin-top: 2px;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        max-width: 100%;
        width: fit-content;
      }

      .address-meta {
        margin: 16px 0 0;
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
        white-space: nowrap;
      }

      .copy-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        flex: 0 0 auto;
        border: 1px solid transparent;
        background: transparent;
        color: #ffffff;
        border-radius: 0;
        padding: 0;
        margin-top: 1px;
      }

      .copy-button.copied {
        border-color: var(--accent);
        color: var(--accent);
      }

      .qr-wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 184px;
        width: 184px;
        padding: 0;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        margin-top: auto;
        padding-top: 28px;
        border-top: 1px solid var(--line);
      }

      .footer-copy p {
        margin: 0;
        color: #ffffff;
        font-size: 0.92rem;
      }

      .github-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .github-link svg {
        color: var(--text);
      }

      .qr-image,
      .qr-placeholder {
        width: 184px;
        height: 184px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #ffffff;
      }

      .qr-image {
        object-fit: contain;
      }

      .qr-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #717c88;
        font-size: 0.96rem;
        font-weight: 700;
        background: #f5f7f9;
      }

      .result-link {
        color: var(--text);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
          gap: 18px;
        }

        .hero {
          align-items: flex-start;
        }

        .card.right-pane {
          border-left: 0;
          padding-left: 0;
        }

        .direct-transfer {
          flex-direction: column;
          align-items: flex-start;
        }

        .footer {
          flex-direction: column;
          align-items: flex-start;
        }

        .or-separator {
          justify-content: flex-start;
        }
      }

      @media (max-width: 640px) {
        main {
          width: min(100vw - 28px, 100%);
          padding: 28px 0 48px;
        }

        .stat-grid,
        .field-grid,
        .action-row {
          grid-template-columns: 1fr;
        }

        .network-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .asset-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }

        .network-button,
        .asset-button {
          min-height: 88px;
        }

        .text-field {
          font-size: 2rem;
        }

        .unit-label {
          justify-content: flex-start;
          padding-bottom: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="hero">
        <h1>Donate</h1>
        <div class="wallet-chip" id="wallet-chip">
          <span class="wallet-chip-dot" aria-hidden="true"></span>
          <span id="wallet-chip-text">지갑 미연결</span>
        </div>
      </header>

      <section class="layout">
        <article class="card">
          <section class="card-section">
            <p class="section-label">Network</p>
            <div class="network-grid" id="network-grid"></div>
          </section>

          <section class="card-section stacked-section">
            <p class="section-label">Asset</p>
            <div class="asset-grid" id="asset-grid"></div>
          </section>

        </article>

        <article class="card right-pane">
          <section class="card-section">
            <p class="section-label">Amount (USD)</p>
            <div class="field-grid">
              <input
                id="usd-input"
                class="text-field"
                type="number"
                min="0"
                step="0.01"
                placeholder="USD"
              />
              <div class="unit-label" aria-hidden="true">USD</div>
            </div>

            <div class="action-row">
              <button type="button" class="button primary" id="donate-button">후원하기</button>
            </div>

            <p class="status-text" id="status-text">시세와 지갑 상태를 확인 중</p>
            <div class="or-separator" aria-hidden="true">OR</div>
            <div class="direct-transfer">
              <div class="address-block">
                <p class="section-label">Address</p>
                <div class="address-field">
                  <p class="address" id="wallet-address"></p>
                  <button
                    type="button"
                    class="copy-button"
                    id="copy-button"
                    aria-label="주소 복사"
                    title="주소 복사"
                  >
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                      aria-hidden="true"
                    >
                      <path
                        d="M9 9.75A2.25 2.25 0 0 1 11.25 7.5h7.5A2.25 2.25 0 0 1 21 9.75v9A2.25 2.25 0 0 1 18.75 21h-7.5A2.25 2.25 0 0 1 9 18.75v-9Z"
                        stroke="currentColor"
                        stroke-width="1.7"
                      />
                      <path
                        d="M15 7.5V5.25A2.25 2.25 0 0 0 12.75 3h-7.5A2.25 2.25 0 0 0 3 5.25v9a2.25 2.25 0 0 0 2.25 2.25H9"
                        stroke="currentColor"
                        stroke-width="1.7"
                      />
                    </svg>
                  </button>
                </div>
                <p class="address-meta" id="address-meta"></p>
                <p class="status-text" id="tx-result"></p>
              </div>

              <div class="qr-wrap">
                <div class="qr-placeholder" id="qr-placeholder">QR</div>
                <img class="qr-image" id="qr-image" alt="Donation QR" hidden />
              </div>
            </div>
          </section>
        </article>
      </section>

      <section class="footer">
        <div class="footer-copy">
          <p>감사합니다! 후원은 유지보수와 기능 개선에 직접적인 도움이 됩니다.</p>
        </div>
        <a
          href="https://github.com/method404"
          target="_blank"
          rel="noreferrer"
          class="github-link"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="currentColor"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path d="M12 .5C5.649.5.5 5.649.5 12c0 5.084 3.292 9.398 7.86 10.921.575.106.785-.25.785-.555 0-.274-.01-1-.015-1.962-3.197.695-3.872-1.54-3.872-1.54-.523-1.328-1.278-1.681-1.278-1.681-1.045-.714.079-.699.079-.699 1.155.081 1.763 1.187 1.763 1.187 1.026 1.757 2.692 1.25 3.349.956.104-.743.402-1.25.731-1.538-2.552-.29-5.236-1.276-5.236-5.682 0-1.255.448-2.282 1.182-3.087-.119-.29-.512-1.458.112-3.04 0 0 .965-.309 3.163 1.179a10.96 10.96 0 0 1 2.88-.387c.977.004 1.963.132 2.882.387 2.196-1.488 3.159-1.18 3.159-1.18.627 1.583.234 2.751.115 3.041.736.805 1.18 1.832 1.18 3.087 0 4.417-2.688 5.389-5.25 5.673.413.355.781 1.054.781 2.125 0 1.534-.014 2.772-.014 3.148 0 .308.207.667.79.554C20.212 21.394 23.5 17.082 23.5 12 23.5 5.649 18.351.5 12 .5Z" />
          </svg>
          <span>github.com/method404</span>
        </a>
      </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.14.4/dist/ethers.umd.min.js"></script>
    <script>
      const donationConfig = {

        },
        networks: [
          {

          {

            iconUrl: "./assets/pol.png",
            chainIdHex: "0x89",
            explorerTxBase: "https://polygonscan.com/tx/",
            color: "#8247e5",
            addChainParams: {
              chainId: "0x89",
              chainName: "Polygon Mainnet",
              nativeCurrency: { name: "POL", symbol: "POL", decimals: 18 },

              },
              usdc: {
                symbol: "USDC",
                coingeckoId: "usd-coin",
                decimals: 6,
                contract: "0x3c499c542cef5e3811e1192ce70d8cc03d5c3359",
              },
            },
          },
          {
            id: "arbitrum",
            label: "ARB",
            name: "Arbitrum",
            iconUrl: "./assets/arb.png",
            chainIdHex: "0xa4b1",
            explorerTxBase: "https://arbiscan.io/tx/",
            color: "#28a0f0",
            addChainParams: {
              chainId: "0xa4b1",
              chainName: "Arbitrum One",
              nativeCurrency: { name: "Ether", symbol: "ETH", decimals: 18 },
              rpcUrls: ["https://arb1.arbitrum.io/rpc"],
              blockExplorerUrls: ["https://arbiscan.io"],
            },
            assets: {
              usdt: {
                symbol: "USDT",
                coingeckoId: "tether",
                decimals: 6,
                contract: "0xFd086bC7CD5C481DCC9C85ebe478A1C0b69FCbb9",
              },
              usdc: {
                symbol: "USDC",
                coingeckoId: "usd-coin",
                decimals: 6,
                contract: "0xaf88d065e77c8cC2239327C5EDb3A432268e5831",
              },
            },
          },
          {
            id: "bsc",
            label: "BSC",
            name: "BNB Smart Chain",
            iconUrl: "./assets/bnb.png",
            chainIdHex: "0x38",
            explorerTxBase: "https://bscscan.com/tx/",
            color: "#f0b90b",
            addChainParams: {
              chainId: "0x38",
              chainName: "BNB Smart Chain",
              nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
              rpcUrls: ["https://bsc-dataseed.binance.org"],
              blockExplorerUrls: ["https://bscscan.com"],
            },
            assets: {
              usdt: {
                symbol: "USDT",
                coingeckoId: "tether",
                decimals: 18,
                contract: "0x55d398326f99059fF775485246999027B3197955",
              },
              usdc: {
                symbol: "USDC",
                coingeckoId: "usd-coin",
                decimals: 18,
                contract: "0x8ac76a51cc950d9822d68b83fe1ad97b32cd580d",
              },
            },
          },
        ],
      };

      const erc20Abi = [
        "function balanceOf(address owner) view returns (uint256)",
        "function transfer(address to, uint256 value) returns (bool)",
      ];

      const state = {
        selectedNetworkId: donationConfig.networks[0].id,
        selectedAssetId: "usdt",
        usdAmount: "20",
        connectedAccount: "",
        connectedChainId: "",
      };

      const networkGrid = document.getElementById("network-grid");
      const assetGrid = document.getElementById("asset-grid");
      const usdInput = document.getElementById("usd-input");
      const donateButton = document.getElementById("donate-button");
      const walletChip = document.getElementById("wallet-chip");
      const walletChipText = document.getElementById("wallet-chip-text");
      const statusText = document.getElementById("status-text");
      const walletAddress = document.getElementById("wallet-address");
      const addressMeta = document.getElementById("address-meta");
      const txResult = document.getElementById("tx-result");
      const copyButton = document.getElementById("copy-button");
      const qrImage = document.getElementById("qr-image");
      const qrPlaceholder = document.getElementById("qr-placeholder");

      function getSelectedNetwork() {
        return (
          donationConfig.networks.find((network) => network.id === state.selectedNetworkId) ||
          donationConfig.networks[0]
        );
      }

      function getSelectedAsset() {
        const network = getSelectedNetwork();
        return network.assets[state.selectedAssetId];
      }

      function truncateMiddle(value, start = 7, end = 5) {
        if (!value || value.length <= start + end + 3) {
          return value;
        }
        return value.slice(0, start) + "..." + value.slice(-end);
      }

      function getTokenAmountNumber() {
        const usd = Number(state.usdAmount);
        if (!Number.isFinite(usd) || usd <= 0) {
          return 0;
        }
        return usd;
      }

      function getTokenAmountString() {
        const amount = getTokenAmountNumber();
        if (!Number.isFinite(amount) || amount <= 0) {
          return "";
        }
        return amount.toFixed(6).replace(/\.?0+$/, "");
      }

      async function ensureWalletProvider() {
        if (!window.ethereum || !window.ethers) {
          throw new Error("브라우저 지갑이 필요합니다.");
        }
        const provider = new window.ethers.BrowserProvider(window.ethereum);
        return provider;
      }

      async function ensureChain(network) {
        const provider = await ensureWalletProvider();
        const activeChainId = await window.ethereum.request({ method: "eth_chainId" });
        if (activeChainId.toLowerCase() === network.chainIdHex.toLowerCase()) {
          state.connectedChainId = activeChainId;
          return provider;
        }

        try {
          await window.ethereum.request({
            method: "wallet_switchEthereumChain",
            params: [{ chainId: network.chainIdHex }],
          });
        } catch (error) {
          if (error && error.code === 4902 && network.addChainParams) {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [network.addChainParams],
            });
          } else {
            throw error;
          }
        }

        state.connectedChainId = network.chainIdHex;
        return provider;
      }

      async function connectWallet() {
        const provider = await ensureWalletProvider();
        const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
        state.connectedAccount = accounts[0] || "";
        state.connectedChainId = await window.ethereum.request({ method: "eth_chainId" });
        render();
        return provider;
      }

      async function hydrateWalletState() {
        if (!window.ethereum) {
          render();
          return;
        }

        const accounts = await window.ethereum.request({ method: "eth_accounts" });
        state.connectedAccount = accounts[0] || "";
        state.connectedChainId = await window.ethereum.request({ method: "eth_chainId" });
        render();

        if (typeof window.ethereum.on === "function") {
          window.ethereum.on("accountsChanged", (accountsChanged) => {
            state.connectedAccount = accountsChanged[0] || "";
            render();
          });

          window.ethereum.on("chainChanged", (chainId) => {
            state.connectedChainId = chainId;
            render();
          });
        }
      }

      async function renderQr() {
        const address = donationConfig.recipientAddress;
        qrImage.src = await QRCode.toDataURL(address, {
          margin: 1,
          width: 220,
          color: { dark: "#12171d", light: "#ffffffff" },
        });
        qrImage.hidden = false;
        qrPlaceholder.hidden = true;
      }

      function renderNetworkButtons() {
        networkGrid.innerHTML = "";
        donationConfig.networks.forEach((network) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "network-button" + (network.id === state.selectedNetworkId ? " active" : "");
          button.addEventListener("click", async () => {
            state.selectedNetworkId = network.id;
            txResult.textContent = "";
            render();

            if (state.connectedAccount && window.ethereum) {
              try {
                await ensureChain(network);
                render();
              } catch (error) {
                statusText.textContent = error?.message || "체인 전환 실패";
              }
            }
          });

          button.innerHTML = `
            <span class="option-icon-wrap">
              <img src="${network.iconUrl}" alt="${network.label}" class="option-icon" width="24" height="24" />
            </span>
            <span class="button-copy">
              <strong>${network.label}</strong>
              <span>${network.name}</span>
            </span>
          `;
          networkGrid.appendChild(button);
        });
      }

      function renderAssetButtons() {
        assetGrid.innerHTML = "";
        const network = getSelectedNetwork();

        Object.entries(network.assets).forEach(([assetId, asset]) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "asset-button" + (assetId === state.selectedAssetId ? " active" : "");
          button.addEventListener("click", () => {
            state.selectedAssetId = assetId;
            txResult.textContent = "";
            render();
          });

          button.innerHTML = `
            <span class="option-icon-wrap">
              <img src="${donationConfig.assetIcons[assetId]}" alt="${asset.symbol}" class="option-icon" width="24" height="24" />
            </span>
            <span class="button-copy">
              <strong>${asset.symbol}</strong>
              <span>${network.label}</span>
            </span>
          `;
          assetGrid.appendChild(button);
        });
      }

      function renderWalletState() {
        const connected = Boolean(state.connectedAccount);
        walletChip.classList.toggle("connected", connected);
        walletChipText.textContent = connected
          ? truncateMiddle(state.connectedAccount, 8, 5)
          : "Wallet not connected";
      }

      function renderManualSection() {
        walletAddress.textContent = donationConfig.recipientAddress;
        walletAddress.title = donationConfig.recipientAddress;
        addressMeta.textContent = "위 주소로 EVM 네트워크 자산 직접 후원도 가능합니다.";
      }

      function renderStatus() {
        const network = getSelectedNetwork();
        const asset = getSelectedAsset();
        const tokenAmount = getTokenAmountString();

        if (!window.ethereum || !window.ethers) {
          statusText.textContent = "";
          donateButton.disabled = !tokenAmount;
          return;
        }

        if (!tokenAmount) {
          statusText.textContent = "";
          donateButton.disabled = true;
          return;
        }

        if (!state.connectedAccount) {
          statusText.textContent = "";
          donateButton.disabled = false;
          return;
        }

        if (state.connectedChainId.toLowerCase() !== network.chainIdHex.toLowerCase()) {
          statusText.textContent = "";
          donateButton.disabled = false;
          return;
        }

        statusText.textContent = "";
        donateButton.disabled = false;
      }

      async function render() {
        renderNetworkButtons();
        renderAssetButtons();
        renderWalletState();
        renderManualSection();
        renderStatus();
        await renderQr();
      }

      usdInput.value = state.usdAmount;
      usdInput.addEventListener("input", () => {
        state.usdAmount = usdInput.value.trim();
        render();
      });

      donateButton.addEventListener("click", async () => {
        txResult.textContent = "";
        try {
          const network = getSelectedNetwork();
          const asset = getSelectedAsset();
          const amountText = getTokenAmountString();
          if (!amountText) {
            throw new Error("전송 수량 계산 실패");
          }

          if (!state.connectedAccount) {
            await connectWallet();
          }

          const provider = await ensureChain(network);
          const signer = await provider.getSigner();
          const contract = new window.ethers.Contract(asset.contract, erc20Abi, signer);
          const amountUnits = window.ethers.parseUnits(amountText, asset.decimals);
          const ownerAddress = await signer.getAddress();
          const balance = await contract.balanceOf(ownerAddress);

          if (balance < amountUnits) {
            const currentBalance = window.ethers.formatUnits(balance, asset.decimals);
            throw new Error(`${asset.symbol} 잔액 부족 (${currentBalance} ${asset.symbol})`);
          }

          const tx = await contract.transfer(donationConfig.recipientAddress, amountUnits);
          txResult.innerHTML = `<a class="result-link" href="${network.explorerTxBase}${tx.hash}" target="_blank" rel="noreferrer">${truncateMiddle(
            tx.hash,
            10,
            8,
          )}</a>`;
          statusText.textContent = "전송 요청 완료";
        } catch (error) {
          const message = String(error?.message || "");

          if (message.includes("User rejected") || message.includes("user rejected")) {
            statusText.textContent = "사용자가 전송 요청 취소";
            return;
          }

          if (message.includes("INSUFFICIENT_FUNDS")) {
            statusText.textContent = "가스비용용 네이티브 코인 부족";
            return;
          }

          if (message.includes("CALL_EXCEPTION") || message.includes("missing revert data")) {
            statusText.textContent = "전송 요청 전 토큰 상태 확인 실패";
            return;
          }

          statusText.textContent = message || "전송 요청 실패";
        }
      });

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(donationConfig.recipientAddress);
        copyButton.classList.add("copied");
        window.setTimeout(() => {
          copyButton.classList.remove("copied");
        }, 1400);
      });

      hydrateWalletState();
    </script>
  </body>
</html>
